tasks:
  - id: app-audit
    title: "ตรวจสอบแอป Pocket Router (Next.js 16 + Supabase)"
    role: verify-as-task
    assigned_to: verifier
    max_retries: 1
    prompt: |
      คุณคือ Verifier ทำหน้าที่ตรวจสอบแอป "Pocket Router" (Next.js 16.2.9 + React 19.2.4 + Supabase + Zustand + Tailwind 4 + shadcn base-nova) ใน workspace D:\dev\money-tagging

      ## บริบทของแอป
      - แอปจัดการเงิน "Pocket Router" — ติดตามการจัดสรรเงินระหว่างธนาคาร (banks) และกระเป๋า (pockets)
      - ใช้ Supabase สำหรับ auth + data, Zustand สำหรับ client state
      - Routes: /, /login, /auth/callback, /banks, /pockets, /pockets/[id]
      - ไฟล์สำคัญ:
        - src/app/{page,layout}.tsx
        - src/app/{auth/callback,login,banks/page,pockets/page,pockets/[id]}/...
        - src/hooks/useAuthStore.ts, usePocketRouterStore.ts
        - src/components/*.tsx (BankCard, PocketCard, BottomNav, ErrorModal, ClientProviders, DashboardSummary, TransferDialog, ConfirmDeleteDialog, DraggableBankAllocationCard, DraggableListItem)
        - src/lib/utils.ts
        - .env.local (Supabase keys — ห้ามแก้ไข ห้าม dump ค่า secret ออกมา)

      ## สิ่งที่ต้องตรวจ (รันจริง ห้ามอ่านอย่างเดียว)

      ### 1. Build / Type / Lint
      - `cd D:\dev\money-tagging` แล้วรัน:
        - `npm run build` — ต้องผ่าน ถ้า fail ให้รายงาน error แรก ๆ ครบ
        - `npm run lint` — รายงาน warning/error ทั้งหมด
        - `npx tsc --noEmit` — รายงาน type errors
      - ถ้า `node_modules` ยังไม่พร้อม ให้ `npm install` ก่อน (อาจใช้เวลานาน — ตั้ง timeout ให้เหมาะสม)

      ### 2. README TODO ทั้ง 4 ข้อ
      ตรวจสถานะจริงของ TODO เหล่านี้ (อ่านไฟล์ที่เกี่ยวข้อง + ค้นหาใน codebase):
      1. "Delete allocations, Improve accessibility on mobile @pocket/[id]"
      2. "Remove right arrow icon on pocket card @/pockets, prevent user missed click"
      3. "Add bank icon on bank card @/banks"
      4. "Remember order /banks and /pockets and both can re-arrange order by drag & drop"
      สำหรับแต่ละข้อ: ระบุสถานะ (เสร็จ / ยังไม่เสร็จ / ทำบางส่วน) + หลักฐาน (ไฟล์:บรรทัด)

      ### 3. Security & Config
      - ตรวจว่า `.env.local` ถูก git-ignore (อ่าน `.gitignore` — ห้ามอ่านค่าใน `.env.local`)
      - ดูว่า Supabase anon key / service role key ถูกใช้ถูกที่ (anon ใน client, service role เฉพาะ server)
      - ตรวจ callback route (`src/app/auth/callback/`) ว่าจัดการ OAuth code exchange ถูกต้อง
      - ตรวจไม่ให้มี secret รั่วใน client bundle (`grep -r "service_role"` ใน src/)

      ### 4. Next.js 16 / React 19 antipatterns
      - Server vs Client component boundary ถูกต้อง (ดู 'use client' directive)
      - Hydration mismatch risk — ใช้ `mounted` pattern ถูกต้องหรือไม่
      - Async params (Next 15+) ใน `pockets/[id]/page.tsx` — `params` ต้อง await
      - ไม่มี `useEffect` ที่ fetch data ที่ควรเป็น server component
      - Tailwind v4 syntax (ดู globals.css) ใช้ @theme / @import ถูกต้อง

      ### 5. Zustand store
      - ตรวจ persist middleware (มี localStorage hydration ถูกต้องไหม)
      - ตรวจ actions ของ `usePocketRouterStore` ไม่มี side-effect ที่อันตราย
      - ตรวจ error handling ใน async actions

      ### 6. UX / Accessibility quick scan
      - ปุ่มที่กดได้แต่ไม่ใช่ `<button>` (a11y)
      - Form inputs มี label
      - Color contrast (ดูใน dark mode tokens)

