      ## Stop condition
      ทันทีที่เขียน report เสร็จ + return verdict (PASS / PASS_WITH_WARNINGS / FAIL) กลับมาในข้อความ report ให้ root session
      - ห้ามแก้ไข source code (verify-as-task ห้ามแก้ไข)
      - ห้ามอ่าน `.env.local` (block โดย permission)
      - ถ้า build ใช้เวลานาน ให้ใช้ timeout >= 10 นาทีสำหรับ npm run build